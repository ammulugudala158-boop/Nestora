kind = "web"
previewPath = "/"
title = "Nestora"
version = "1.0.0"
id = "artifacts/nestora"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19752

[services.development]
run = "pnpm --filter @workspace/nestora run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nestora", "run", "build" ]
serve = "static"
publicDir = "artifacts/nestora/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19752"
BASE_PATH = "/"
